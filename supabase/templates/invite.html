<div
  style="
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 520px;
    margin: 0 auto;
    padding: 32px 20px;
    color: #333;
  "
>
  <h2 style="color: #f21e40; margin-bottom: 24px">Vous êtes invité·e sur Débats.co !</h2>
  <p>
    Vous avez été invité·e à rejoindre Débats.co. Cliquez sur le bouton ci-dessous pour accepter
    l'invitation et créer votre compte :
  </p>
  <p style="text-align: center; margin: 32px 0">
    <a
      href="{{ .SiteURL }}/accepter-invitation?token_hash={{ .TokenHash }}&type=invite&email={{ urlquery .Email }}"
      style="
        background-color: #f21e40;
        color: white;
        padding: 12px 28px;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
      "
      >Accepter l'invitation</a
    >
  </p>
  <p style="font-size: 13px; color: #666">
    Si vous n'attendiez pas cette invitation, vous pouvez ignorer cet e-mail.
  </p>
</div>
