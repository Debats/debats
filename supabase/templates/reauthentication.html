<div
  style="
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 520px;
    margin: 0 auto;
    padding: 32px 20px;
    color: #333;
  "
>
  <h2 style="color: #f21e40; margin-bottom: 24px">Vérification de sécurité</h2>
  <p>Pour confirmer votre identité sur Débats.co, entrez le code ci-dessous dans l'application :</p>
  <p
    style="
      text-align: center;
      margin: 32px 0;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 6px;
      color: #f21e40;
    "
  >
    {{ .Token }}
  </p>
  <p style="font-size: 13px; color: #666">
    Si vous n'avez pas initié cette action, changez votre mot de passe immédiatement.
  </p>
</div>
