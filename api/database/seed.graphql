        slug: "frederic-lordon",
        createdBy: { connect: { email: "chuck.is@everywhere" } }
    }) { id }

    histoire: createSubject( data: {
        title: "Enseignement de l'Histoire de France"
        slug: "enseignement-de-l-histoire-de-france",
        description: "Depuis les années 1970, et comme pour toutes les nations, la vision nationaliste de l'histoire est remise en cause par de nombreux historiens et qualifiée de roman national (Pierre Nora), mythe national (Suzanne Citron), mythologie nationale (Roger Garaudy). Selon les historiens qui ont étudié la construction des histoires nationales le choix d'y inclure ou d'en exclure des personnages, des peuples et des événements ainsi que le point de vue selon lequel ils sont présentés est systématiquement biaisé (voire déformé) vers la légitimité de tout ce qui va dans le sens de l'éternité de la Nation dans ses limites au moins actuelles et l'illégitimité ou l'inexistence de tout ce qui la mettrait en cause.",
        positions: { create: [
            {
                title: "Ordre chronologique",
                description: "dans le sens du temps qui et que ne revient pas",
                statements: { create: [
                    {
                        evidenceSource: "TF1",
                        evidenceUrl: "http://www.tf1.fr",
                        quote: "Dieu est mort",
                        node: "node",
                        date: "2018-04-04",
                        publicFigure: { connect: { slug: "nicolas-sarkozy" }},
                        arguments: {create: {
                            title: "Sinon il serait vivint",
                            description: "Ehhh oui",
                            subject: { connect: { slug: "enseignement-de-l-histoire-de-france" }}
                        }}
                    }
                ]}
            }
        ]},
