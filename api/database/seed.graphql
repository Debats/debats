mutation {
    john: createUser (data: {name: "John Doe", email: "john@doe.fr", password: "doedoe"}) {id}
    chuck: createUser (data: {name: "Chuck Norris", email: "chuck.is@everywhere", password: "godislame"}) {id}

    hollande: createPublicFigure (data: {
        name: "François Hollande",
        presentation: """François Hollande, né le 12 août 1954 à Rouen en Seine-Inférieure, est un homme d&#39;État français. Depuis le 15 mai 2012, il est le 24e président de la République française.
        Magistrat à la Cour des comptes, et avocat pendant quelques mois entre 1996 et 1997, il est premier secrétaire du Parti socialiste de 1997 à 2008, pendant la troisième cohabitation puis dans l&#39;opposition. Maire de Tulle de 2001 à 2008, il est député de la première circonscription de la Corrèze de 1988 à 1993 et de nouveau de 1997 à 2012, et préside le conseil général de la Corrèze de 2008 à 2012.
        Désigné candidat du PS et du PRG à l&#39;élection présidentielle de 2012 à l&#39;issue d&#39;une primaire, il emporte le second tour avec 51,64 % des voix face au président sortant, Nicolas Sarkozy, le 6 mai 2012. Il prend ses fonctions de 24e président de la République française le 15 mai 2012.
        """,
        wikipediaUrl: "https://fr.wikipedia.org/wiki/Fran%C3%A7ois_Hollande",
        slug: "francois-hollande",
        createdBy: { connect: { email: "chuck.is@everywhere" } }
    }) { id }
    sarkozy: createPublicFigure (data: {
        name: "Nicolas Sarkozy",
        presentation: "Ancien président",
        wikipediaUrl: "https://fr.wikipedia.org/wiki/Nicolas_Sarkozy",
        slug: "nicolas-sarkozy",
        createdBy: { connect: { email: "chuck.is@everywhere" } }
    }) { id }
    lepen: createPublicFigure (data: {
        name: "Marine Le Pen",
