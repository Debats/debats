projects:
  app:
    schemaPath: schema.graphql
    extensions:
      endpoints:
        default: http://localhost:4000
  database:
    schemaPath: database/generated/prisma.graphql
    extensions:
      endpoints:
        default: http://localhost:4467
      prisma: database/prisma.yml
      codegen:
        generator: prisma-binding
        language: javascript
        output:
          binding: database/generated/prisma.js
